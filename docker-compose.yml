services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5440:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - image_storage

volumes:
  postgres_data:

networks:
  image_storage:
